name: Build & Deploy to Google Play

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Java ──────────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Install JS dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Decode keystore from secret ───────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-key.jks

      # ── 6. Write key.properties ──────────────────────────────────────────────
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storeFile=app/upload-key.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── 7. Compute version ───────────────────────────────────────────────────
      - name: Compute version
        id: version
        run: |
          VERSION_NAME=$(node -p "require('./package.json').version")
          VERSION_CODE=$(( ${{ github.run_number }} + 100 ))
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building $VERSION_NAME ($VERSION_CODE)"

      # ── 8. Grant execute permission to gradlew ───────────────────────────────
      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      # ── 9. Build release AAB ─────────────────────────────────────────────────
      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -PversionCode=${{ steps.version.outputs.VERSION_CODE }} \
            -PversionName=${{ steps.version.outputs.VERSION_NAME }}

      # ── 10. Save AAB as downloadable artifact ────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.VERSION_NAME }}-(${{ steps.version.outputs.VERSION_CODE }})
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 11. Upload to Google Play (Alpha track) — skipped if secret missing ──
      - name: Upload to Google Play
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.Anushadeliverypartnerapp
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed
          whatsNewDirectory: distribution/whatsnew
